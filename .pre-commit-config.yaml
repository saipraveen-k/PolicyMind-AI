# Pre-commit hooks for PolicyMind AI
# See https://pre-commit.com for more information

repos:
  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # General quality checks
      - id: trailing-whitespace
        name: "Trim trailing whitespace"
      - id: end-of-file-fixer
        name: "Fix end of files"
      - id: check-yaml
        name: "Check YAML syntax"
        args: ["--unsafe"]
      - id: check-json
        name: "Check JSON syntax"
      - id: check-toml
        name: "Check TOML syntax"
      - id: check-merge-conflict
        name: "Check for merge conflicts"
      - id: check-case-conflict
        name: "Check for case conflicts"
      - id: check-docstring-first
        name: "Check docstring first"
      - id: check-executables-have-shebangs
        name: "Check executables have shebangs"
      - id: check-shebang-scripts-are-executable
        name: "Check shebang scripts are executable"
      - id: check-vcs-permalinks
        name: "Check VCS permalinks"
      - id: destroyed-symlinks
        name: "Check for destroyed symlinks"
      - id: mixed-line-ending
        name: "Fix mixed line endings"
        args: ["--fix=lf"]
      - id: detect-private-key
        name: "Detect private keys"
      - id: detect-aws-credentials
        name: "Detect AWS credentials"
        args: ["--allow-missing-credentials"]

  # Python specific hooks
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: "Sort imports with isort"
        args: ["--profile", "black", "--filter-files"]

  # Code formatting with Black
  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        name: "Format code with Black"
        language_version: python3.9
        args: ["--line-length", "88"]

  # Linting with Flake8
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        name: "Lint code with Flake8"
        args: ["--max-line-length=88", "--extend-ignore=E203,W503"]

  # Type checking with MyPy (optional, can be slow)
  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v1.8.0
  #   hooks:
  #     - id: mypy
  #       name: "Type check with Mypy"
  #       args: ["--ignore-missing-imports"]
  #       additional_dependencies:
  #         - pydantic>=2.0.0
  #         - types-requests

  # Security checks
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        name: "Check security with Bandit"
        args: ["-r", "-ll"]
        exclude: ^(tests/|docs/)

  # Check for common restructured text issues
  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-check-blanket-noqa
        name: "Check blanket noqa comments"
      - id: python-check-blanket-type-ignore
        name: "Check blanket type ignore comments"
      - id: python-use-type-annotations
        name: "Check for type annotations"
      - id: python-no-log-warn
        name: "Check for deprecated log.warn"
      - id: python-no-eval
        name: "Check for eval usage"
      - id: python-no-assert-default-message
        name: "Check assert has message"

  # Check for large files
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-added-large-files
        name: "Check for large files"
        args: ["--maxkb=1000"]
      - id: check-case-conflict
        name: "Check for case conflicts in filenames"

  # Check for TODO/FIXME comments (optional)
  # - repo: https://github.com/pre-commit/pre-commit-hooks
  #   rev: v4.5.0
  #   hooks:
  #     - id: fixme
  #       name: "Check for FIXME comments"
  #     - id: todo
  #       name: "Check for TODO comments"

# Exclude patterns
exclude: ^(docs/_build/|\.venv/|venv/|\.tox/|\.eggs/|\.git/|\.mypy_cache/|\.pytest_cache/)

# Default language version
default_language_version:
  python: python3.9